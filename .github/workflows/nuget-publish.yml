name: NuGet Publish

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version for manual run (for example 0.1.1)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet paket restore

      - name: Restore NuGet assets
        run: dotnet restore ./TypedConfig.slnx

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          dotnet pack ./TypedConfig/TypedConfig.fsproj -c Release --no-build -o ./artifacts -p:PackageVersion="$VERSION"

      - name: Push packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
